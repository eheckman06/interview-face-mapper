app = "interview-face-mapper"
primary_region = "lax"

[build]
  dockerfile = "Dockerfile"

[env]
  DATA_DIR = "/app/data"
  HOST = "0.0.0.0"
  PORT = "10000"

[http_service]
  internal_port = 10000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    path = "/health"
    interval = "30s"
    timeout = "5s"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 2

[mounts]
  source = "interview_data"
  destination = "/app/data"
